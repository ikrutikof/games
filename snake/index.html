<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SNAKE RUN // CYBERPUNK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --cyan:    #00f5ff;
      --magenta: #ff00a0;
      --yellow:  #f5e642;
      --green:   #39ff14;
      --dark:    #050510;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 100;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      padding: 20px 20px max(40px, env(safe-area-inset-bottom, 20px));
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900; font-size: clamp(1rem, 4vw, 1.8rem);
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%,94%,100% { transform:none; text-shadow:0 0 8px var(--cyan),0 0 24px var(--cyan),0 0 60px rgba(0,245,255,0.4); }
      95% { transform:translate(-3px,0) skewX(-2deg); text-shadow:-3px 0 var(--magenta),3px 0 var(--yellow); }
      96% { transform:translate(3px,0) skewX(2deg);  text-shadow:3px 0 var(--magenta),-3px 0 var(--yellow); }
      97% { transform:none; }
      98% { transform:translate(-2px,1px); text-shadow:-2px 0 var(--magenta); }
      99% { transform:none; }
    }

    .game-area { display:flex; gap:14px; align-items:flex-start; }

    .board-wrap { position:relative; }

    canvas#board {
      border: 1px solid rgba(0,245,255,0.3);
      box-shadow: 0 0 20px rgba(0,245,255,0.15);
      display: block;
    }

    .overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      background:rgba(5,5,16,0.88); z-index:20;
    }

    .overlay-title {
      font-family:'Orbitron',sans-serif;
      font-size:1.1rem; font-weight:900;
      letter-spacing:0.2em; text-transform:uppercase;
    }

    .overlay-score { font-size:0.75rem; color:#555a8a; letter-spacing:0.1em; text-transform:uppercase; }

    .sidebar { display:flex; flex-direction:column; gap:12px; min-width:100px; }

    .panel {
      border:1px solid rgba(0,245,255,0.2);
      background:rgba(0,245,255,0.03);
      padding:8px 10px; display:flex; flex-direction:column; gap:4px;
    }

    .panel-label { font-family:'Orbitron',sans-serif; font-size:0.5rem; letter-spacing:0.15em; color:#555a8a; text-transform:uppercase; }
    .panel-val   { font-family:'Orbitron',sans-serif; font-size:1.2rem; font-weight:700; color:var(--cyan); text-shadow:0 0 10px var(--cyan); }

    .legend { display:flex; flex-direction:column; gap:6px; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:0.6rem; color:#555a8a; letter-spacing:0.08em; }
    .legend-dot  { width:14px; height:14px; flex-shrink:0; }

    .btn {
      font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.15em;
      text-transform:uppercase; color:var(--cyan); background:transparent;
      border:1px solid var(--cyan); padding:8px 12px; cursor:pointer;
      transition:all 0.2s; box-shadow:0 0 8px rgba(0,245,255,0.15);
    }
    .btn:hover  { background:rgba(0,245,255,0.08); box-shadow:0 0 16px rgba(0,245,255,0.4); }
    .btn:active { transform:scale(.97); }

    .mobile-controls { display:none; gap:10px; align-items:center; }

    .ctrl-btn {
      font-family:'Orbitron',sans-serif; font-size:1.4rem; color:var(--cyan);
      background:rgba(0,245,255,0.05); border:1px solid rgba(0,245,255,0.3);
      width:70px; height:70px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; -webkit-user-select:none; transition:background 0.1s;
    }
    .ctrl-btn:active { background:rgba(0,245,255,0.2); }

    @media (max-width:520px) { .mobile-controls { display:flex; } }

    .footer { font-size:.6rem; color:#2a2a4a; letter-spacing:.1em; text-transform:uppercase; }
  </style>
</head>
<body>
<div class="wrapper">
  <h1>SNAKE RUN // CYBERPUNK</h1>

  <div class="game-area">
    <div class="board-wrap">
      <canvas id="board" width="300" height="540"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">SNAKE RUN</div>
        <div class="overlay-score" id="overlay-score"></div>
        <button class="btn" id="start-btn">[ СТАРТ ]</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-label">Счёт</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Длина</div>
        <div class="panel-val" id="length">4</div>
      </div>
      <div class="panel">
        <div class="panel-label">Скорость</div>
        <div class="panel-val" id="speed-val">1</div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <canvas class="legend-dot" id="ld-food"></canvas><span>ЕДА +10</span>
        </div>
        <div class="legend-item">
          <canvas class="legend-dot" id="ld-soft"></canvas><span>МЯГКИЙ +5</span>
        </div>
        <div class="legend-item">
          <canvas class="legend-dot" id="ld-hard"></canvas><span>СТЕНА ✕</span>
        </div>
      </div>

      <button class="btn" id="pause-btn">[ ПАУЗА ]</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="ctrl-btn" id="btn-left">←</div>
    <div class="ctrl-btn" id="btn-right">→</div>
  </div>

  <div class="footer">// ДЕРЖИ ← → ДЛЯ ДВИЖЕНИЯ //</div>
</div>

<script>
  const COLS = 10, ROWS = 18, CELL = 30;
  const CW = COLS * CELL, CH = ROWS * CELL;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  let snake, objects, camWY, score, snakeLen, speedLevel;
  let gameOver, paused, inputDX, lastTime, tickAccum, nextGenWY;

  function tickMs() { return Math.max(80, 220 - (speedLevel - 1) * 18); }

  // ── Start ─────────────────────────────────────────────────────────────────
  function startGame() {
    snakeLen = 4; score = 0; speedLevel = 1;
    gameOver = paused = false; inputDX = 0;
    lastTime = null; tickAccum = 0;

    snake = [];
    for (let i = 0; i < snakeLen; i++) snake.push({ x: 4, wy: -i });

    objects = [];
    camWY = -(ROWS - 3);
    nextGenWY = -(ROWS + 2);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('pause-btn').textContent = '[ ПАУЗА ]';
    updateHUD();
    generateAhead();
    cancelAnimationFrame(window._aid);
    window._aid = requestAnimationFrame(loop);
  }

  // ── Generation ────────────────────────────────────────────────────────────
  function generateAhead() {
    const target = camWY - ROWS * 2;
    while (nextGenWY > target) { spawnRow(nextGenWY--); }
  }

  function spawnRow(wy) {
    if (wy > -ROWS) return;
    const r = Math.random();
    if (r < 0.32) {
      const cols = shuffled();
      const n = Math.random() < 0.25 ? 2 : 1;
      for (let i = 0; i < n; i++) objects.push({ x: cols[i], wy, type: 'food' });
    } else if (r < 0.52) {
      objects.push({ x: randCol(), wy, type: 'soft' });
    } else if (r < 0.72) {
      const maxBlocks = Math.min(5, 1 + Math.floor(speedLevel / 2));
      const n = Math.min(maxBlocks, COLS - 3);
      shuffled().slice(0, n).forEach(c => objects.push({ x: c, wy, type: 'hard' }));
    }
  }

  function randCol() { return Math.floor(Math.random() * COLS); }
  function shuffled() {
    const a = Array.from({length: COLS}, (_, i) => i);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Tick ──────────────────────────────────────────────────────────────────
  function tick() {
    const head = snake[0];
    const nx = Math.max(0, Math.min(COLS - 1, head.x + inputDX));
    const nwy = head.wy + 1;

    if (objects.find(o => o.x === nx && o.wy === nwy && o.type === 'hard')) { endGame(); return; }
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === nx && snake[i].wy === nwy) { endGame(); return; }
    }

    let grow = false;

    const softI = objects.findIndex(o => o.x === nx && o.wy === nwy && o.type === 'soft');
    if (softI !== -1) { objects.splice(softI, 1); score += 5; grow = true; }

    const foodI = objects.findIndex(o => o.x === nx && o.wy === nwy && o.type === 'food');
    if (foodI !== -1) { objects.splice(foodI, 1); score += 10; snakeLen++; grow = true; }

    score += 1;
    snake.unshift({ x: nx, wy: nwy });
    while (snake.length > snakeLen) snake.pop();

    camWY = snake[0].wy - (ROWS - 3);
    objects = objects.filter(o => o.wy > camWY - 2 && o.wy < camWY + ROWS + 2);
    generateAhead();

    speedLevel = Math.floor(score / 150) + 1;
    updateHUD();
  }

  function endGame() {
    gameOver = true;
    cancelAnimationFrame(window._aid);
    document.getElementById('overlay-title').textContent = 'GAME OVER';
    document.getElementById('overlay-score').textContent = `СЧЁТ: ${score}`;
    document.getElementById('start-btn').textContent = '[ ЗАНОВО ]';
    document.getElementById('overlay').style.display = 'flex';
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, CW, CH);

    ctx.strokeStyle = 'rgba(0,245,255,0.04)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(CW, r*CELL); ctx.stroke(); }
    for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, CH); ctx.stroke(); }

    objects.forEach(o => {
      const sy = (o.wy - camWY) * CELL;
      if (sy < -CELL || sy > CH + CELL) return;
      const sx = o.x * CELL;
      ctx.shadowBlur = 0;

      if (o.type === 'food') {
        ctx.shadowColor = '#f5e642'; ctx.shadowBlur = 14;
        ctx.fillStyle = '#f5e642';
        ctx.beginPath(); ctx.arc(sx + CELL/2, sy + CELL/2, CELL/4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(245,230,66,0.08)';
        ctx.fillRect(sx+1, sy+1, CELL-2, CELL-2);
      } else if (o.type === 'soft') {
        ctx.fillStyle = 'rgba(57,255,20,0.1)'; ctx.fillRect(sx+1, sy+1, CELL-2, CELL-2);
        ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 1.5;
        ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 8;
        ctx.strokeRect(sx+3, sy+3, CELL-6, CELL-6);
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(57,255,20,0.65)';
        ctx.font = `bold ${CELL*0.38}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('◆', sx+CELL/2, sy+CELL/2);
      } else {
        ctx.fillStyle = 'rgba(255,0,160,0.25)'; ctx.fillRect(sx+1, sy+1, CELL-2, CELL-2);
        ctx.fillStyle = 'rgba(255,0,160,0.75)'; ctx.fillRect(sx+4, sy+4, CELL-8, CELL-8);
        ctx.strokeStyle = '#ff00a0'; ctx.lineWidth = 1;
        ctx.shadowColor = '#ff00a0'; ctx.shadowBlur = 10;
        ctx.strokeRect(sx+1.5, sy+1.5, CELL-3, CELL-3);
        ctx.shadowBlur = 0;
      }
    });

    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const sy = (s.wy - camWY) * CELL;
      const sx = s.x * CELL;
      const t = i / snake.length;
      if (i === 0) {
        ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 20;
        ctx.fillStyle = '#00f5ff';
        ctx.fillRect(sx+2, sy+2, CELL-4, CELL-4);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#050510';
        ctx.fillRect(sx+6, sy+8, 4, 4);
        ctx.fillRect(sx+CELL-10, sy+8, 4, 4);
      } else {
        ctx.globalAlpha = 1 - t * 0.65;
        ctx.fillStyle = '#00f5ff';
        ctx.fillRect(sx+4, sy+4, CELL-8, CELL-8);
        ctx.globalAlpha = (1 - t * 0.65) * 0.3;
        ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 1;
        ctx.strokeRect(sx+3, sy+3, CELL-6, CELL-6);
        ctx.globalAlpha = 1;
      }
    }

    // Speed bar
    const barW = Math.min(CW, (Math.min(speedLevel, 10) / 10) * CW);
    ctx.fillStyle = 'rgba(0,245,255,0.1)'; ctx.fillRect(0, 0, CW, 3);
    ctx.fillStyle = '#00f5ff'; ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 4;
    ctx.fillRect(0, 0, barW, 3); ctx.shadowBlur = 0;
  }

  // ── Loop ──────────────────────────────────────────────────────────────────
  function loop(ts) {
    if (gameOver || paused) return;
    const dt = ts - (lastTime || ts);
    lastTime = ts;
    tickAccum += dt;
    const ms = tickMs();
    while (tickAccum >= ms) { tickAccum -= ms; tick(); }
    draw();
    window._aid = requestAnimationFrame(loop);
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('length').textContent = snakeLen;
    document.getElementById('speed-val').textContent = speedLevel;
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    document.getElementById('pause-btn').textContent = paused ? '[ ИГРАТЬ ]' : '[ ПАУЗА ]';
    if (!paused) { lastTime = null; window._aid = requestAnimationFrame(loop); }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); inputDX = -1; }
    if (e.key === 'ArrowRight') { e.preventDefault(); inputDX =  1; }
    if (e.key === 'p' || e.key === 'P') togglePause();
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft'  && inputDX === -1) inputDX = 0;
    if (e.key === 'ArrowRight' && inputDX ===  1) inputDX = 0;
  });

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('pause-btn').addEventListener('click', togglePause);

  function holdBtn(id, dn, up) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); up(); }, {passive:false});
    el.addEventListener('mousedown', dn);
    el.addEventListener('mouseup', up);
  }
  holdBtn('btn-left',  () => { inputDX = -1; }, () => { if (inputDX === -1) inputDX = 0; });
  holdBtn('btn-right', () => { inputDX =  1; }, () => { if (inputDX ===  1) inputDX = 0; });

  // ── Legend ────────────────────────────────────────────────────────────────
  function ldot(id, fn) {
    const c = document.getElementById(id);
    const x = c.getContext('2d');
    fn(x);
  }
  ldot('ld-food', x => {
    x.shadowColor='#f5e642'; x.shadowBlur=6; x.fillStyle='#f5e642';
    x.beginPath(); x.arc(7,7,4,0,Math.PI*2); x.fill();
  });
  ldot('ld-soft', x => {
    x.strokeStyle='#39ff14'; x.lineWidth=1.5; x.shadowColor='#39ff14'; x.shadowBlur=4;
    x.strokeRect(2,2,10,10);
  });
  ldot('ld-hard', x => {
    x.fillStyle='rgba(255,0,160,0.8)'; x.fillRect(2,2,10,10);
    x.strokeStyle='#ff00a0'; x.lineWidth=1; x.strokeRect(1.5,1.5,11,11);
  });

  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, CW, CH);
</script>
</body>
</html>
