<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ЗМЕЙКА // CYBERPUNK</title>
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
  <div class="nav-bar">
    <a class="btn" href="/">← АРКАДА</a>
    <span class="nav-breadcrumb">// ARCADE // ЗМЕЙКА</span>
  </div>
  <h1>ЗМЕЙКА // CYBERPUNK</h1>

  <div class="game-area">
    <div class="board-wrap">
      <canvas id="board" width="600" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">ЗМЕЙКА</div>
        <div class="overlay-score" id="overlay-score"></div>
        <button class="btn" id="start-btn">[ СТАРТ ]</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-label">Счёт</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Длина</div>
        <div class="panel-val" id="length">4</div>
      </div>
      <div class="panel">
        <div class="panel-label">Скорость</div>
        <div class="panel-val" id="speed-val">1</div>
      </div>
      <button class="btn" id="pause-btn">[ ПАУЗА ]</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="dpad">
      <div class="ctrl-btn" id="btn-up">↑</div>
      <div class="ctrl-row-h">
        <div class="ctrl-btn" id="btn-left">←</div>
        <div class="ctrl-btn" id="btn-right">→</div>
      </div>
      <div class="ctrl-btn" id="btn-down">↓</div>
    </div>
  </div>

  <div class="footer">// WASD ИЛИ СТРЕЛКИ // P — ПАУЗА //</div>
</div>

<script src="game.js"></script>
<script src="/shared/arcade.js"></script>
</body>
</html>
