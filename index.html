<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ARCADE // CYBERPUNK</title>
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>// ARCADE //</h1>
    <p class="subtitle">выбери игру</p>

    <div class="games-grid">
      <a class="game-card" href="/tictactoe/">
        <div class="game-icon">✕ ○</div>
        <div class="game-title">Крестики-нолики</div>
        <div class="game-desc">3×3 и 5×5 // vs AI</div>
        <span class="badge-new">NEW</span>
      </a>
      <a class="game-card" href="/tetris/">
        <div class="game-icon">▬ ▮</div>
        <div class="game-title">Тетрис</div>
        <div class="game-desc">10 уровней // классика</div>
        <span class="badge-new">NEW</span>
      </a>
      <a class="game-card" href="/snake/">
        <div class="game-icon">〜 ●</div>
        <div class="game-title">Змейка</div>
        <div class="game-desc">классика // ешь и расти</div>
        <span class="badge-new">NEW</span>
      </a>
      <a class="game-card" href="/breakout/">
        <div class="game-icon">🧱</div>
        <div class="game-title">Арканоид</div>
        <div class="game-desc">разбей все блоки</div>
        <span class="badge-new">NEW</span>
      </a>
    </div>

    <div class="footer">// БОЛЬШЕ ИГР СКОРО //</div>
  </div>
</body>
</html>
