<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ARCADE // CYBERPUNK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --cyan:    #00f5ff;
      --magenta: #ff00a0;
      --yellow:  #f5e642;
      --dark:    #050510;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px 20px max(40px, env(safe-area-inset-bottom, 20px)) 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 6vw, 3rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%, 94%, 100% { transform: none; text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4); }
      95%  { transform: translate(-3px,0) skewX(-2deg); text-shadow: -3px 0 var(--magenta), 3px 0 var(--yellow); }
      96%  { transform: translate(3px,0) skewX(2deg);  text-shadow:  3px 0 var(--magenta),-3px 0 var(--yellow); }
      97%  { transform: none; }
      98%  { transform: translate(-2px,1px); text-shadow: -2px 0 var(--magenta); }
      99%  { transform: none; }
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: #555a8a;
      text-transform: uppercase;
      margin-top: -28px;
    }

    .games-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 800px;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 32px;
      border: 1px solid rgba(0,245,255,0.2);
      background: rgba(0,245,255,0.03);
      box-shadow: 0 0 20px rgba(0,245,255,0.06);
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      min-width: 200px;
    }

    .game-card:hover {
      border-color: var(--cyan);
      background: rgba(0,245,255,0.07);
      box-shadow: 0 0 30px rgba(0,245,255,0.2);
      transform: translateY(-4px);
    }

    .game-icon {
      font-size: 2.4rem;
    }

    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .game-desc {
      font-size: 0.65rem;
      color: #555a8a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .badge-new {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: var(--magenta);
      border: 1px solid var(--magenta);
      padding: 2px 8px;
      text-transform: uppercase;
    }

    .footer {
      font-size: .65rem;
      color: #2a2a4a;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>// ARCADE //</h1>
    <p class="subtitle">выбери игру</p>

    <div class="games-grid">
      <a class="game-card" href="/tictactoe/">
        <div class="game-icon">✕ ○</div>
        <div class="game-title">Крестики-нолики</div>
        <div class="game-desc">3×3 и 5×5 // vs AI</div>
        <span class="badge-new">NEW</span>
      </a>
      <a class="game-card" href="/tetris/">
        <div class="game-icon">▬ ▮</div>
        <div class="game-title">Тетрис</div>
        <div class="game-desc">10 уровней // классика</div>
        <span class="badge-new">NEW</span>
      </a>
    </div>

    <div class="footer">// БОЛЬШЕ ИГР СКОРО //</div>
  </div>
</body>
</html>
