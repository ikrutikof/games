<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#050510"/>
  <!-- Corner brackets -->
  <path d="M2,2 h5 M2,2 v5" stroke="#00f5ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M30,2 h-5 M30,2 v5" stroke="#00f5ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M2,30 h5 M2,30 v-5" stroke="#00f5ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M30,30 h-5 M30,30 v-5" stroke="#00f5ff" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Joystick ball -->
  <circle cx="16" cy="13" r="5.5" fill="#00f5ff"/>
  <circle cx="16" cy="13" r="5.5" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <!-- Joystick stick -->
  <rect x="14.5" y="18" width="3" height="7" rx="1.5" fill="#00f5ff" opacity="0.85"/>
  <!-- Base -->
  <rect x="9" y="25" width="14" height="3" rx="1.5" fill="#00f5ff" opacity="0.6"/>
  <!-- Glow dot on ball -->
  <circle cx="14" cy="11" r="1.5" fill="#ffffff" opacity="0.35"/>
</svg>
