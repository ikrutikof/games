<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ТЕТРИС // CYBERPUNK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --cyan:    #00f5ff;
      --magenta: #ff00a0;
      --yellow:  #f5e642;
      --dark:    #050510;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 100;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 20px max(40px, env(safe-area-inset-bottom, 20px));
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.2rem, 4vw, 2rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan), 0 0 24px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%,94%,100% { transform:none; text-shadow: 0 0 8px var(--cyan),0 0 24px var(--cyan),0 0 60px rgba(0,245,255,0.4); }
      95% { transform:translate(-3px,0) skewX(-2deg); text-shadow:-3px 0 var(--magenta),3px 0 var(--yellow); }
      96% { transform:translate(3px,0) skewX(2deg);  text-shadow: 3px 0 var(--magenta),-3px 0 var(--yellow); }
      97% { transform:none; }
      98% { transform:translate(-2px,1px); text-shadow:-2px 0 var(--magenta); }
      99% { transform:none; }
    }

    .game-area {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    canvas#board {
      border: 1px solid rgba(0,245,255,0.3);
      box-shadow: 0 0 20px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,0,0,0.5);
      display: block;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 110px;
    }

    .panel {
      border: 1px solid rgba(0,245,255,0.2);
      background: rgba(0,245,255,0.03);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .panel-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: #555a8a;
      text-transform: uppercase;
    }

    .panel-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
    }

    canvas#next {
      display: block;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cyan);
      background: transparent;
      border: 1px solid var(--cyan);
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 8px rgba(0,245,255,0.15);
    }

    .btn:hover { background: rgba(0,245,255,0.08); box-shadow: 0 0 16px rgba(0,245,255,0.4); }
    .btn:active { transform: scale(.97); }

    /* Mobile controls */
    .mobile-controls {
      display: none;
      gap: 8px;
      flex-direction: column;
      align-items: center;
    }

    .ctrl-row { display: flex; gap: 8px; }

    .ctrl-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--cyan);
      background: rgba(0,245,255,0.05);
      border: 1px solid rgba(0,245,255,0.3);
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
    }

    .ctrl-btn:active { background: rgba(0,245,255,0.2); }
    .ctrl-btn.wide { width: 112px; }

    @media (max-width: 520px) {
      .mobile-controls { display: flex; }
      .sidebar { min-width: 90px; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(5,5,16,0.85);
      z-index: 20;
    }

    .overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .board-wrap {
      position: relative;
    }

    .footer { font-size:.6rem; color:#2a2a4a; letter-spacing:.1em; text-transform:uppercase; }
  </style>
</head>
<body>
<div class="wrapper">
  <h1>ТЕТРИС // CYBERPUNK</h1>

  <div class="game-area">
    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">ТЕТРИС</div>
        <button class="btn" id="start-btn">[ СТАРТ ]</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-label">Счёт</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Линии</div>
        <div class="panel-val" id="lines">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Уровень</div>
        <div class="panel-val" id="level">1</div>
      </div>
      <div class="panel">
        <div class="panel-label">Следующий</div>
        <canvas id="next" width="110" height="90"></canvas>
      </div>
      <button class="btn" id="pause-btn">[ ПАУЗА ]</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btn-rotate">↑</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btn-left">←</div>
      <div class="ctrl-btn" id="btn-down">↓</div>
      <div class="ctrl-btn" id="btn-right">→</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn wide" id="btn-drop">DROP</div>
    </div>
  </div>

  <div class="footer">// ← → ДВИЖЕНИЕ · ↑ ПОВОРОТ · ↓ БЫСТРЕЕ · ПРОБЕЛ DROP //</div>
</div>

<script>
  const COLS = 10, ROWS = 20, CELL = 30;
  const COLORS = {
    I: '#00f5ff', O: '#f5e642', T: '#ff00a0',
    S: '#39ff14', Z: '#ff4444', J: '#4d79ff', L: '#ff9500'
  };
  const SHAPES = {
    I: [[1,1,1,1]],
    O: [[1,1],[1,1]],
    T: [[0,1,0],[1,1,1]],
    S: [[0,1,1],[1,1,0]],
    Z: [[1,1,0],[0,1,1]],
    J: [[1,0,0],[1,1,1]],
    L: [[0,0,1],[1,1,1]]
  };
  const TYPES = Object.keys(SHAPES);
  const SCORE_TABLE = [0, 100, 300, 500, 800];

  const boardCanvas = document.getElementById('board');
  const ctx = boardCanvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');

  let board, piece, nextType, score, linesCount, level;
  let gameOver, paused, animId, lastTime, dropAccum;

  function rotate(matrix) {
    const rows = matrix.length, cols = matrix[0].length;
    const result = Array.from({length: cols}, () => Array(rows).fill(0));
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        result[c][rows - 1 - r] = matrix[r][c];
    return result;
  }

  function collides(mat, ox, oy) {
    for (let r = 0; r < mat.length; r++)
      for (let c = 0; c < mat[r].length; c++) {
        if (!mat[r][c]) continue;
        const nx = ox + c, ny = oy + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
    return false;
  }

  function spawnPiece() {
    const type = nextType || TYPES[Math.floor(Math.random() * TYPES.length)];
    nextType = TYPES[Math.floor(Math.random() * TYPES.length)];
    const mat = SHAPES[type].map(r => [...r]);
    const x = Math.floor((COLS - mat[0].length) / 2);
    piece = { type, mat, x, y: 0, color: COLORS[type] };
    if (collides(piece.mat, piece.x, piece.y)) {
      endGame();
    }
    drawNext();
  }

  function lockPiece() {
    for (let r = 0; r < piece.mat.length; r++)
      for (let c = 0; c < piece.mat[r].length; c++) {
        if (!piece.mat[r][c]) continue;
        const row = piece.y + r;
        if (row < 0) { endGame(); return; }
        board[row][piece.x + c] = piece.color;
      }
    clearLines();
    spawnPiece();
  }

  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(Boolean)) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(null));
        cleared++;
        r++;
      }
    }
    if (!cleared) return;
    linesCount += cleared;
    score += SCORE_TABLE[cleared] * level;
    level = Math.floor(linesCount / 10) + 1;
    document.getElementById('score').textContent = score;
    document.getElementById('lines').textContent = linesCount;
    document.getElementById('level').textContent = level;
  }

  function dropInterval() {
    return Math.max(100, 800 - (level - 1) * 70);
  }

  function tryMove(dx, dy) {
    if (collides(piece.mat, piece.x + dx, piece.y + dy)) return false;
    piece.x += dx;
    piece.y += dy;
    return true;
  }

  function tryRotate() {
    const rotated = rotate(piece.mat);
    const kicks = [0, -1, 1, -2, 2];
    for (const kick of kicks) {
      if (!collides(rotated, piece.x + kick, piece.y)) {
        piece.mat = rotated;
        piece.x += kick;
        return;
      }
    }
  }

  function hardDrop() {
    while (!collides(piece.mat, piece.x, piece.y + 1)) piece.y++;
    lockPiece();
  }

  function ghostY() {
    let gy = piece.y;
    while (!collides(piece.mat, piece.x, gy + 1)) gy++;
    return gy;
  }

  function drawCell(context, x, y, color, alpha = 1) {
    context.globalAlpha = alpha;
    context.fillStyle = color;
    context.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
    context.globalAlpha = 0.4 * alpha;
    context.strokeStyle = '#fff';
    context.lineWidth = 0.5;
    context.strokeRect(x * CELL + 1.5, y * CELL + 1.5, CELL - 3, CELL - 3);
    context.globalAlpha = 1;
  }

  function draw() {
    // Background
    ctx.fillStyle = 'rgba(5,5,16,0.95)';
    ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,245,255,0.04)';
    ctx.lineWidth = 1;
    for (let r = 0; r < ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
    }
    for (let c = 0; c < COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, ROWS * CELL); ctx.stroke();
    }

    // Placed cells
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (board[r][c]) drawCell(ctx, c, r, board[r][c]);

    if (piece) {
      // Ghost
      const gy = ghostY();
      for (let r = 0; r < piece.mat.length; r++)
        for (let c = 0; c < piece.mat[r].length; c++)
          if (piece.mat[r][c]) drawCell(ctx, piece.x + c, gy + r, piece.color, 0.18);

      // Active piece
      for (let r = 0; r < piece.mat.length; r++)
        for (let c = 0; c < piece.mat[r].length; c++)
          if (piece.mat[r][c]) drawCell(ctx, piece.x + c, piece.y + r, piece.color);
    }
  }

  function drawNext() {
    nctx.fillStyle = 'rgba(5,5,16,0.95)';
    nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!nextType) return;
    const mat = SHAPES[nextType];
    const color = COLORS[nextType];
    const cellSize = 22;
    const offX = Math.floor((nextCanvas.width - mat[0].length * cellSize) / 2);
    const offY = Math.floor((nextCanvas.height - mat.length * cellSize) / 2);
    for (let r = 0; r < mat.length; r++)
      for (let c = 0; c < mat[r].length; c++)
        if (mat[r][c]) {
          nctx.fillStyle = color;
          nctx.fillRect(offX + c * cellSize + 1, offY + r * cellSize + 1, cellSize - 2, cellSize - 2);
          nctx.globalAlpha = 0.4;
          nctx.strokeStyle = '#fff';
          nctx.lineWidth = 0.5;
          nctx.strokeRect(offX + c * cellSize + 1.5, offY + r * cellSize + 1.5, cellSize - 3, cellSize - 3);
          nctx.globalAlpha = 1;
        }
  }

  function gameLoop(ts) {
    if (gameOver || paused) return;
    const dt = ts - (lastTime || ts);
    lastTime = ts;
    dropAccum += dt;
    if (dropAccum >= dropInterval()) {
      dropAccum = 0;
      if (!tryMove(0, 1)) lockPiece();
    }
    draw();
    animId = requestAnimationFrame(gameLoop);
  }

  function startGame() {
    board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    score = 0; linesCount = 0; level = 1;
    gameOver = false; paused = false;
    dropAccum = 0; lastTime = null;
    document.getElementById('score').textContent = '0';
    document.getElementById('lines').textContent = '0';
    document.getElementById('level').textContent = '1';
    document.getElementById('overlay').style.display = 'none';
    nextType = null;
    spawnPiece();
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(gameLoop);
  }

  function endGame() {
    gameOver = true;
    cancelAnimationFrame(animId);
    const ov = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = 'ИГРА ОКОНЧЕНА';
    document.getElementById('start-btn').textContent = '[ ЗАНОВО ]';
    ov.style.display = 'flex';
  }

  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    document.getElementById('pause-btn').textContent = paused ? '[ ИГРАТЬ ]' : '[ ПАУЗА ]';
    if (!paused) {
      lastTime = null;
      animId = requestAnimationFrame(gameLoop);
    }
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('pause-btn').addEventListener('click', togglePause);

  document.addEventListener('keydown', e => {
    if (gameOver || paused) return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); tryMove(-1, 0); draw(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); tryMove(1, 0);  draw(); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); if (!tryMove(0, 1)) lockPiece(); draw(); }
    if (e.key === 'ArrowUp')    { e.preventDefault(); tryRotate(); draw(); }
    if (e.key === ' ')          { e.preventDefault(); hardDrop(); draw(); }
    if (e.key === 'p' || e.key === 'P') togglePause();
  });

  // Mobile buttons
  function addBtn(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => { e.preventDefault(); if (!gameOver && !paused) { fn(); draw(); } }, {passive: false});
    el.addEventListener('mousedown', e => { if (!gameOver && !paused) { fn(); draw(); } });
  }
  addBtn('btn-left',   () => tryMove(-1, 0));
  addBtn('btn-right',  () => tryMove(1, 0));
  addBtn('btn-down',   () => { if (!tryMove(0, 1)) lockPiece(); });
  addBtn('btn-rotate', () => tryRotate());
  addBtn('btn-drop',   () => hardDrop());

  // Initial draw
  ctx.fillStyle = 'rgba(5,5,16,0.95)';
  ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
</script>
</body>
</html>
