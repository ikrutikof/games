<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ТЕТРИС // CYBERPUNK</title>
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
  <h1>ТЕТРИС // CYBERPUNK</h1>

  <div class="game-area">
    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">ТЕТРИС</div>
        <button class="btn" id="start-btn">[ СТАРТ ]</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-label">Счёт</div>
        <div class="panel-val" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Линии</div>
        <div class="panel-val" id="lines">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Уровень</div>
        <div class="panel-val" id="level">1</div>
      </div>
      <div class="panel">
        <div class="panel-label">Следующий</div>
        <canvas id="next" width="110" height="90"></canvas>
      </div>
      <button class="btn" id="pause-btn">[ ПАУЗА ]</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btn-rotate">↑</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btn-left">←</div>
      <div class="ctrl-btn" id="btn-down">↓</div>
      <div class="ctrl-btn" id="btn-right">→</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn wide" id="btn-drop">DROP</div>
    </div>
  </div>

  <div class="footer">// ← → ДВИЖЕНИЕ · ↑ ПОВОРОТ · ↓ БЫСТРЕЕ · ПРОБЕЛ DROP //</div>
</div>

<script src="game.js"></script>
</body>
</html>
